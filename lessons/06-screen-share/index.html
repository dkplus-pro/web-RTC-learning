<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>第 06 课：屏幕共享与 Track 替换</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">Lesson 06 · WebRTC</p>
        <h1>屏幕共享与 Track 替换</h1>
        <p>
          在一个本地 loopback 连接中体验摄像头、屏幕共享和 <code>replaceTrack()</code>。
          重点观察：连接不需要重建，远端视频轨会被无缝替换。
        </p>
      </header>

      <section class="controls" aria-label="操作区">
        <button id="startCamera">1. 启动摄像头并建立连接</button>
        <button id="shareScreen" disabled>2. 替换为屏幕共享</button>
        <button id="backToCamera" disabled>3. 切回摄像头</button>
        <button id="stopAll" class="danger" disabled>停止并清理</button>
      </section>

      <section class="videos" aria-label="视频预览">
        <article>
          <h2>本地发送源</h2>
          <video id="localVideo" autoplay muted playsinline></video>
        </article>
        <article>
          <h2>远端接收视图</h2>
          <video id="remoteVideo" autoplay playsinline></video>
        </article>
      </section>

      <section class="inspector">
        <h2>连接观察</h2>
        <dl>
          <div><dt>本地连接状态</dt><dd id="localState">idle</dd></div>
          <div><dt>远端连接状态</dt><dd id="remoteState">idle</dd></div>
          <div><dt>当前发送视频轨</dt><dd id="activeTrack">无</dd></div>
        </dl>
        <pre id="log" aria-live="polite"></pre>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
